<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#cba6f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ทะเบียนวิสัญญี" />
  <title>ทะเบียนวิสัญญี</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root {
      --bg: #f5f0ff;
      --card: #ffffff;
      --ink: #4b3868;
      --accent: #cba6f7;
      --accent-deep: #8f62cc;
      --border: #e7d9ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Thai', sans-serif;
      color: var(--ink);
      overflow: hidden;
    }
    .splash {
      position: fixed; inset: 0; z-index: 9999;
      display: grid; place-items: center;
      background:
        radial-gradient(circle at center, rgba(203,166,247,.38), transparent 28%),
        linear-gradient(180deg, #aa96bb 0%, #8f7a9d 100%);
      transition: opacity .42s ease, visibility .42s ease;
    }
    .splash.hide { opacity: 0; visibility: hidden; }
    .splash-card {
      display:flex; flex-direction:column; align-items:center; gap:18px; text-align:center;
      color:#fff;
    }
    .splash-card img {
      width: 124px; height: 124px; border-radius: 28px;
      box-shadow: 0 18px 44px rgba(0,0,0,.18);
      background: rgba(255,255,255,.08);
    }
    .splash-title { font-size: 34px; font-weight: 900; line-height: 1.05; }
    .splash-sub { opacity: .92; font-size: 16px; }
    .spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.28); border-top-color: #fff;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .shell {
      min-height: 100dvh; display: flex; flex-direction: column;
      opacity: 0; transform: translateY(8px);
      transition: opacity .35s ease, transform .35s ease;
    }
    .shell.ready { opacity: 1; transform: translateY(0); }
    .topbar {
      display:flex; align-items:center; gap:12px;
      padding: max(12px, env(safe-area-inset-top)) 16px 12px;
      background: linear-gradient(180deg, rgba(203,166,247,.95), rgba(245,240,255,.96));
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      flex: 0 0 auto;
    }
    .logo {
      width: 44px; height: 44px; border-radius: 14px; overflow:hidden; background:#fff;
      box-shadow: 0 6px 16px rgba(143,98,204,.18);
    }
    .logo img { width:100%; height:100%; object-fit:cover; display:block; }
    .title-wrap h1 { margin:0; font-size:20px; line-height:1.05; }
    .title-wrap p { margin:4px 0 0; font-size:12px; opacity:.82; }
    .frame-wrap {
      flex:1 1 auto; padding: 10px; min-height: 0;
    }
    .frame-card {
      width:100%; height:100%; background:#fff; border:1px solid var(--border); border-radius:20px;
      overflow:hidden; box-shadow: 0 10px 30px rgba(118,80,170,.10); position:relative;
    }
    iframe { border:0; width:100%; height:100%; background:#fff; display:block; }
    .frame-overlay {
      position:absolute; inset:0; display:none; place-items:center;
      background: linear-gradient(180deg, rgba(245,240,255,.98), rgba(245,240,255,.93));
      z-index:5; text-align:center; padding:24px;
    }
    .frame-overlay.show { display:grid; }
    .overlay-card {
      max-width: 520px; background:#fff; border:1px solid var(--border); border-radius:20px;
      padding:22px; box-shadow: 0 10px 30px rgba(118,80,170,.10);
    }
    .btn {
      appearance:none; border:0; text-decoration:none; display:inline-flex; align-items:center; justify-content:center;
      padding:12px 16px; border-radius:14px; font-weight:800; cursor:pointer; margin:8px 6px 0;
    }
    .btn.primary { background:linear-gradient(135deg, var(--accent-deep), #7d4dd0); color:#fff; }
    .btn.secondary { background:#fff; color:var(--ink); border:1px solid var(--border); }
    .note { font-size:13px; color:#6e5d86; line-height:1.6; }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="splash-card">
      <img src="icon-512.png" alt="ทะเบียนวิสัญญี" />
      <div class="splash-title">ทะเบียนวิสัญญี</div>
      <div class="splash-sub">Loading application...</div>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </div>

  <div class="shell" id="shell">
    <div class="topbar">
      <div class="logo"><img src="icon-192.png" alt="icon"></div>
      <div class="title-wrap">
        <h1>ทะเบียนวิสัญญี</h1>
        <p>Anesthesia Registry</p>
      </div>
    </div>
    <div class="frame-wrap">
      <div class="frame-card">
        <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbwGaEc4JQme3zKaWQe3bfQ_X3fqB0POPao6HIylAbztry5fHtWPiS3-cmZZMG51uztQ/exec" referrerpolicy="no-referrer"></iframe>
        <div class="frame-overlay" id="overlay">
          <div class="overlay-card">
            <h2 style="margin:0 0 10px;">เปิดแบบฝังไม่สำเร็จ</h2>
            <div class="note">
              เวอร์ชันนี้เป็นแบบฝังหน้าแอปใน iframe จึงต้องให้ Apps Script ของคุณเปิด
              <code>setXFrameOptionsMode(HtmlService.XFrameOptionsMode.ALLOWALL)</code>
              ใน <code>doGet(e)</code> และต้อง deploy เวอร์ชันล่าสุด
            </div>
            <a class="btn primary" href="https://script.google.com/macros/s/AKfycbwGaEc4JQme3zKaWQe3bfQ_X3fqB0POPao6HIylAbztry5fHtWPiS3-cmZZMG51uztQ/exec">เปิดลิงก์ตรง</a>
            <button class="btn secondary" id="retryBtn">ลองใหม่</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const splash = document.getElementById('splash');
    const shell = document.getElementById('shell');
    const frame = document.getElementById('appFrame');
    const overlay = document.getElementById('overlay');
    const retryBtn = document.getElementById('retryBtn');
    let frameLoaded = false;

    function revealApp() {
      shell.classList.add('ready');
      splash.classList.add('hide');
    }

    window.addEventListener('load', () => {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
      setTimeout(revealApp, 650);
      setTimeout(() => {
        if (!frameLoaded) overlay.classList.add('show');
      }, 3500);
    });

    frame.addEventListener('load', () => {
      frameLoaded = true;
      overlay.classList.remove('show');
    });

    retryBtn.addEventListener('click', () => {
      overlay.classList.remove('show');
      frameLoaded = false;
      frame.src = 'https://script.google.com/macros/s/AKfycbwGaEc4JQme3zKaWQe3bfQ_X3fqB0POPao6HIylAbztry5fHtWPiS3-cmZZMG51uztQ/exec?t=' + Date.now();
      setTimeout(() => {
        if (!frameLoaded) overlay.classList.add('show');
      }, 3500);
    });
  </script>
</body>
</html>
