<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ทะเบียนวิสัญญี</title>

  <style>
    body {
      margin: 0;
      background: #8f74a4;
      font-family: sans-serif;
    }

    /* Splash */
    #splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #a889bf, #8f74a4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
    }

    #splash img {
      width: 140px;
      border-radius: 30px;
      margin-bottom: 20px;
    }

    /* iframe */
    iframe {
      border: none;
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

<!-- Splash -->
<div id="splash">
  <img src="icon-512.png">
  <h2>ทะเบียนวิสัญญี</h2>
  <p>Loading...</p>
</div>

<!-- App -->
<iframe id="app"
src="https://script.google.com/macros/s/AKfycbykVbePwI5Q79VJSzv7V-WUACeG8kyx9BDGJYE-C0pWAru1XcoL-Xja7sZm0QOLMpjT/exec">
</iframe>

<script>
  const iframe = document.getElementById('app');
  const splash = document.getElementById('splash');

  iframe.onload = () => {
    setTimeout(() => {
      splash.style.display = 'none';
    }, 500);
  };
</script>

</body>
</html>
