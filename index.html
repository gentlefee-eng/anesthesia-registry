<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#cba6f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ทะเบียนวิสัญญี" />
  <title>ทะเบียนวิสัญญี</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root{
      --bg1:#aa8fc1;
      --bg2:#8f74a4;
      --ink:#ffffff;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans Thai',sans-serif;
      background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 100%);
      color:var(--ink);
      overflow:hidden;
    }
    .wrap{
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .card{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      text-align:center;
      animation:fadeIn .35s ease;
    }
    .logo{
      width:128px;
      height:128px;
      border-radius:28px;
      box-shadow:0 18px 40px rgba(0,0,0,.18);
      background:rgba(255,255,255,.08);
      object-fit:cover;
    }
    h1{
      margin:0;
      font-size:34px;
      line-height:1.08;
      font-weight:900;
      text-shadow:0 2px 10px rgba(0,0,0,.10);
    }
    p{
      margin:0;
      font-size:18px;
      opacity:.95;
    }
    .spinner{
      width:34px;height:34px;border-radius:50%;
      border:3px solid rgba(255,255,255,.28);
      border-top-color:#fff;
      animation:spin 1s linear infinite;
      margin-top:6px;
    }
    .hint{
      margin-top:10px;
      font-size:13px;
      opacity:.85;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img class="logo" src="icon-512.png" alt="ทะเบียนวิสัญญี">
      <h1>ทะเบียนวิสัญญี</h1>
      <p>Anesthesia Registry</p>
      <div class="spinner" aria-hidden="true"></div>
      <div class="hint">กำลังเปิดระบบ...</div>
    </div>
  </div>

  <script>
    const TARGET_URL = "https://script.google.com/macros/s/AKfycbwGaEc4JQme3zKaWQe3bfQ_X3fqB0POPao6HIylAbztry5fHtWPiS3-cmZZMG51uztQ/exec";

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    setTimeout(() => {
      window.location.replace(TARGET_URL);
    }, 1200);
  </script>
</body>
</html>
