<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#cba6f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ทะเบียนวิสัญญี" />
  <title>ทะเบียนวิสัญญี</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root {
      --bg: #f5f0ff;
      --card: #ffffff;
      --ink: #4b3868;
      --accent: #cba6f7;
      --accent-deep: #8f62cc;
      --border: #e7d9ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Thai', sans-serif;
      color: var(--ink);
    }
    #app { min-height: 100dvh; display: flex; flex-direction: column; }
    .topbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px calc(12px + env(safe-area-inset-top));
      background: linear-gradient(180deg, rgba(203,166,247,0.95), rgba(245,240,255,0.95));
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 40px; height: 40px; border-radius: 12px;
      background: white; display: grid; place-items: center; box-shadow: 0 4px 14px rgba(143,98,204,0.18);
      overflow: hidden;
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; }
    .title-wrap h1 { margin: 0; font-size: 20px; line-height: 1.1; }
    .title-wrap p { margin: 4px 0 0; font-size: 12px; opacity: .8; }
    .frame-wrap { flex: 1; padding: 12px; }
    .frame-card {
      width: 100%; height: calc(100dvh - 98px - env(safe-area-inset-top));
      border-radius: 18px; overflow: hidden; background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(118, 80, 170, 0.10);
    }
    iframe { width: 100%; height: 100%; border: 0; background: white; }
    .fallback {
      display: none; padding: 24px; line-height: 1.6;
    }
    .btn {
      display: inline-block; margin-top: 12px; padding: 10px 14px; border-radius: 12px;
      background: var(--accent); color: var(--ink); text-decoration: none; font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="logo"><img src="icon-192.png" alt="icon"></div>
      <div class="title-wrap">
        <h1>ทะเบียนวิสัญญี</h1>
        <p>Anesthesia Registry</p>
      </div>
    </div>
    <div class="frame-wrap">
      <div class="frame-card">
        <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbwGaEc4JQme3zKaWQe3bfQ_X3fqB0POPao6HIylAbztry5fHtWPiS3-cmZZMG51uztQ/exec" referrerpolicy="no-referrer"></iframe>
        <div class="fallback" id="fallback">
          <h2>เปิดแอปไม่สำเร็จในโหมดฝังหน้า</h2>
          <p>ถ้า Google Apps Script ของคุณยังไม่ได้เปิดให้แสดงใน iframe ให้เพิ่ม <code>setXFrameOptionsMode(HtmlService.XFrameOptionsMode.ALLOWALL)</code> ใน <code>doGet(e)</code></p>
          <a class="btn" href="https://script.google.com/macros/s/AKfycbwGaEc4JQme3zKaWQe3bfQ_X3fqB0POPao6HIylAbztry5fHtWPiS3-cmZZMG51uztQ/exec">เปิดลิงก์ตรง</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    }
    const frame = document.getElementById('appFrame');
    const fallback = document.getElementById('fallback');
    let switched = false;
    setTimeout(() => {
      try {
        // If iframe stays blank because of frame restrictions, user still sees fallback option.
        if (!switched) {
          fallback.style.display = 'block';
          frame.style.display = 'none';
        }
      } catch (e) {}
    }, 4000);
    frame.addEventListener('load', () => {
      switched = true;
    });
  </script>
</body>
</html>
